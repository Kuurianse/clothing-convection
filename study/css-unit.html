<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Unit</title>
    <style>
      /* 
      ✅ "em bergantung pada font-size dari elemen itu sendiri, jika font-size tidak diatur, maka em bergantung pada font-size parent."
      Jadi, jika font-size diatur dalam elemen itu sendiri, maka em mengikuti ukuran itu.

      ✅ "rem bergantung pada font-size dari root (html). rem bagus untuk font agar konsisten secara global." 

      ✅ "em sering digunakan untuk properti seperti padding atau margin karena berskala dengan font-size elemen tersebut."
     */

      /* em =============================================================================== */
      html {
        /* Default: 16px  */
        /* font-size: 20px; */
      }
      .container {
        font-size: 1em;
      }
      ul {
        font-size: 1em;
      }
      li {
        border: 1px solid black;
        width: fit-content;
        /* font-size: 10px; */
        font-size: 1.5rem;
        padding: 1em;
        /* 1em padding (16px) = font-size 1.5rem (24px) */
      }

      /* rem em ========================================================================= */
      .btn {
        background-color: red;
        color: white;
        font-weight: bold;
        border: none;

        font-size: 2rem;
        padding: 1em 2em;
        /* padding: 32px; */
      }

      /* margin with em ================================================================== */
      .container-2 {
        /* font-size: 2em; */
        /* font-size: 50px; */
      }
      .cube {
        margin-top: 1rem;
        font-size: 30px;
        /* Jika font-size diatur maka 10em * font-size, jika tidak maka default *16px */
        width: 10em;
        height: 10em;
        background-color: orange;
      }

      /* vh dan vw ==================================================================== */
      .cube-1 {
        margin-top: 1rem;
        /* width: 10em;
        height: 10em; */
        width: 100vw;
        /* width: 100%; */
        height: 50vh;
        /* height: 300px; */
        background-color: skyblue;
      }
      /* 
      Kapan Menggunakan vh dan vw?
      ✅ Untuk membuat elemen full-screen, misalnya hero section pada landing page.
      ✅ Untuk membuat elemen responsif tanpa tergantung kontennya.
      ✅ Untuk modifikasi tinggi atau lebar berdasarkan viewport (misalnya modal, overlay).
      */
      .full-screen {
        width: 100vw; /* Lebar = 100% dari layar */
        height: 100vh; /* Tinggi = 100% dari layar */
        background-color: lightblue;
      }

      /* min-width dan max-width ======================================================== */
      .container-4 {
        border: 1px solid red;
        margin: 1rem auto;
        padding: 1em;
        width: 60vw;
      }
      .box {
        border: 1rem solid rgb(211, 12, 12);
        background-color: lightcoral;

        /* width: 200px; */
        height: 100px;
        min-width: 500px; /* Tidak bisa lebih kecil dari 150px */
        max-width: 600px; /* Tidak bisa lebih besar dari 400px */
        width: 100%; /* Akan mengikuti lebar parent, tapi tetap dalam batas min & max */
      }

      /* min-height dan max-height ====================================================== */
      .container-5 {
        border: 1px solid red;
        margin: 1rem auto;
        padding: 1em;
        width: 60vw;
        height: 50vh;
      }
      .box-1 {
        border: 1px solid black;
        background-color: lightcoral;

        /* height: 200px; */
        width: 100%;

        min-height: 400px; /* Tidak bisa lebih kecil dari 150px */
        max-height: 500px; /* Tidak bisa lebih besar dari 400px */
        height: 100%; /* Akan mengikuti tinggi parent, tapi tetap dalam batas min & max */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <ul>
        <li>Number 1</li>
        <li>Number 2</li>
        <li>Number 3</li>
        <li>Number 4</li>
        <li>Number 5</li>
      </ul>
    </div>
    <div class="container-1">
      <button class="btn">Button</button>
    </div>
    <div class="container-2">
      <div class="cube"></div>
    </div>
    <div class="container-3">
      <div class="cube-1"></div>
    </div>
    <div class="container-4">
      <div class="box">min-width & max-width</div>
    </div>
    <div class="container-5">
      <div class="box-1">min-height & max-height</div>
    </div>
  </body>
</html>
