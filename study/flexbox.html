<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
      .container {
        border: 1px solid black;
        width: 50%;
        min-width: 150px;
        margin: 30px auto;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .box {
        background-color: skyblue;
        width: 150px;
        height: 150px;
      }

      .container-1 {
        border: 1px solid black;
        margin: 30px auto;
        width: 50%;
        /* width: 600px; */
        min-width: 150px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .box-1 {
        background-color: skyblue;
        min-width: 150px;
        max-width: 250px;
        /* width: 100%; */
        flex-grow: 1;
        /* bagusan flex grow daripada 100% */
        height: 150px;
      }
      .container-1 .dua{
        /* flex-grow: 2; */
        /* akan selalu max-width tapi kalo container mengecil bakal jadi min-width */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box satu">1</div>
      <div class="box dua">2</div>
      <div class="box tiga">3</div>
      <div class="box empat">4</div>
      <div class="box lima">5</div>
    </div>
    <div class="container-1">
      <div class="box-1 satu">1</div>
      <div class="box-1 dua">2</div>
      <div class="box-1 tiga">3</div>
      <div class="box-1 empat">4</div>
      <div class="box-1 lima">5</div>
    </div>
  </body>
</html>
